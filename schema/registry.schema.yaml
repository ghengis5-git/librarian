# registry.schema.yaml — defines the full structure of REGISTRY.yaml
#
# REGISTRY.yaml is the single source of truth for document governance.
# It contains three top-level keys: project_config, documents, and registry_meta.

registry:
  type: object
  description: Complete REGISTRY.yaml file structure.
  required:
    - documents
  properties:

    # ---------------------------------------------------- project_config
    project_config:
      description: >-
        Project-specific configuration.  See project_config.schema.yaml
        for the full property definitions.
      type: object

    # ---------------------------------------------------- documents
    documents:
      type: array
      description: Ordered list of all registered documents.
      items:
        type: object
        required: [filename, status]
        properties:
          filename:
            type: string
            description: >-
              Canonical filename.  Must match the file on disk exactly.
              Used as the unique identifier for the document.

          title:
            type: string
            description: Human-readable document title.

          description:
            type: string
            description: >-
              One-paragraph description of the document content and purpose.
              Displayed in status reports and the dashboard.

          format:
            type: string
            enum: [md, docx, html, jsx, json, pdf, pptx, xlsx, sh, py, yaml]
            description: File format (extension without the dot).

          version:
            type: string
            description: >-
              Current version string.  Matches the VX.Y in the filename
              for convention-compliant files.  May be "1.0", "V1.0", etc.

          date:
            type: string
            format: date
            description: Date of creation or last major revision (YYYY-MM-DD).

          status:
            type: string
            enum: [draft, active, superseded, archived]
            description: >-
              Lifecycle status.
              draft — placeholder, content incomplete.
              active — current authoritative version.
              superseded — replaced by a newer version.
              archived — moved to archive path for long-term retention.

          author:
            type: string
            description: Document author name.

          classification:
            type: string
            description: >-
              Security classification level.  Must be one of the values
              defined in project_config.classification_levels.

          locations:
            type: object
            description: Where copies of this document exist.
            properties:
              disk:
                type: boolean
                description: File exists on local filesystem.
              chat:
                type: boolean
                description: File exists in Claude Chat project knowledge.
              cowork:
                type: boolean
                description: File accessible via Cowork mount.

          parent:
            type: [string, "null"]
            description: >-
              Filename of the parent document, if this is an addendum
              or supplement.  Null for standalone documents.

          supplements:
            type: array
            items: { type: string }
            description: >-
              List of filenames that this document supplements.
              Creates dependency edges in the manifest graph.

          cross_references:
            type: array
            description: >-
              Explicit cross-reference declarations.  Each entry
              identifies a target document and the sections affected.
            items:
              type: object
              properties:
                doc:
                  type: string
                  description: Target document filename.
                sections:
                  type: array
                  items: { type: string }
                  description: Specific sections in the target document.
                status:
                  type: string
                  enum: [pending, resolved, unknown]
                  description: Whether the cross-reference has been addressed.
                resolved_date:
                  type: string
                  format: date
                resolution:
                  type: string
                  description: How the cross-reference was resolved.

          supersedes:
            type: [string, array, "null"]
            description: >-
              Filename(s) of documents this one replaces.  String for a
              single predecessor, array for merge-supersession.

          superseded_by:
            type: [string, "null"]
            description: Filename of the document that replaced this one.

          tags:
            type: array
            items: { type: string }
            description: >-
              Classification tags.  Should use values from
              project_config.tags_taxonomy but are not strictly enforced.

          path:
            type: string
            description: >-
              Relative path from repo root to the file on disk.
              Used by the manifest generator to locate files for hashing.

          infrastructure_exempt:
            type: boolean
            description: >-
              Whether this file is exempt from the date-version naming
              convention.  True for files like SKILL.md, README.md.

          exemption_reason:
            type: string
            description: >-
              Why this file is infrastructure-exempt.  Required when
              infrastructure_exempt is true.

          date_archived:
            type: string
            format: date
            description: Date the file was moved to the archive path.

          next_review:
            type: [string, "null"]
            format: date
            description: >-
              Optional review deadline (ISO 8601 YYYY-MM-DD).  When today's
              date is past this value AND the document is in draft or active
              status, the audit reports it as overdue and the Audit page
              counts it in the "Overdue reviews" KPI card.  Null or omitted
              means no deadline tracked for this document.  Set via
              `librarian review set`, `librarian register --review-by`, or
              `librarian bump --review-by`.

    # ---------------------------------------------------- registry_meta
    registry_meta:
      type: object
      description: >-
        Aggregate metadata about the registry.  Updated automatically
        by Registry.update_meta() and manually during audits.
      properties:
        total_documents:
          type: integer
          minimum: 0
        active:
          type: integer
          minimum: 0
        draft:
          type: integer
          minimum: 0
        superseded:
          type: integer
          minimum: 0
        archived:
          type: integer
          minimum: 0
        pending_cross_reference_updates:
          type: integer
          minimum: 0
        naming_violations:
          type: integer
          minimum: 0
        total_on_disk:
          type: integer
          minimum: 0
        last_audit:
          type: string
          format: date
        last_updated:
          type: string
          format: date
        version_convention_note:
          type: string
          description: >-
            Human-readable note about the project's naming convention
            history (e.g., legacy underscore migration).
