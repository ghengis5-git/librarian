project_config:
  project_name: Librarian
  naming_convention: descriptive-name-YYYYMMDD-VX.Y.ext
  naming_rules:
    separator: '-'
    case: lowercase
    forbidden_words:
    - file
    - download
    - output
    - document
    infrastructure_exempt:
    - SKILL.md
    - REGISTRY.yaml
    - CLAUDE.md
    - README.md
    - .gitignore
    - .python-version
    - manifest.schema.json
    - project_config.schema.yaml
    - registry.schema.yaml
    - project_config.minimal.yaml
    - project_config.full.yaml
    - project_config.prism.yaml
  default_author: Chris Kahn
  default_classification: PERSONAL / INTERNAL USE ONLY
  classification_levels:
  - PERSONAL / INTERNAL USE ONLY
  - CONFIDENTIAL
  - PUBLIC
  tags_taxonomy:
    domain:
    - governance
    - infrastructure
    - architecture
    - operational
    - meta
    phase:
    - phase-a
    - phase-b
    - phase-c
    - phase-d
    - phase-e
    - phase-f
    type:
    - skill-definition
    - technical-spec
    - schema
    - tool
    - example
    - project-plan
    - report
    status_indicators:
    - needs-update
    - pending-review
    - blocked
  tracked_dirs:
  - docs/
  - skill/
  - schema/
  - examples/
  docs_path: docs/
  archive_path: docs/archive/
  diagrams_path: docs/diagrams/
  operator_path: docs/phase-specs/
  staleness_threshold_days: 90
  git_author_name: Chris Kahn
  git_author_email: research+ai@brokenwire.org
  git_commit_prefixes:
    docs: 'docs:'
    registry: 'registry:'
    infra: 'infra:'
    skill: 'skill:'
    refactor: 'refactor:'
  os_target: darwin
